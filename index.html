<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avatar Shop</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body { font-family: system-ui; background: #0a0a0a; color: #fff; margin: 0; padding: 0; }
    .header { background: linear-gradient(90deg, #229ed9, #1a7ab8); padding: 20px; text-align: center; font-size: 26px; font-weight: bold; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; padding: 20px; }
    .card { background: #1f1f1f; border-radius: 16px; overflow: hidden; text-align: center; }
    .card img { width: 100%; height: 160px; object-fit: cover; }
    .card h3 { margin: 10px 0 5px; font-size: 15px; }
    .price { color: #00ff9d; font-weight: bold; }
    .buy-btn { background: #00b16a; color: white; border: none; padding: 12px; width: 100%; font-size: 16px; cursor: pointer; }
    .cart { position: fixed; bottom: 20px; right: 20px; background: #229ed9; padding: 15px 20px; border-radius: 50px; font-size: 18px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
  </style>
</head>
<body>
  <div class="header">🖼️ Avatar Shop — Красивые аватарки</div>
  
  <div class="grid" id="products"></div>

  <div class="cart" id="cart">🛒 <span id="cart-count">0</span></div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    let cart = [];

    const products = [
      { id: 1, name: "Космос & Неон", price: 49, stars: 49, img: "https://i.imgur.com/твоя_ссылка1.jpg", file: "https://твоя_прямая_ссылка_на_архив1.zip" },
      { id: 2, name: "Аниме стиль", price: 79, stars: 79, img: "https://i.imgur.com/твоя_ссылка2.jpg", file: "https://твоя_прямая_ссылка_на_архив2.zip" },
      { id: 3, name: "Минимализм 2026", price: 119, stars: 119, img: "https://i.imgur.com/твоя_ссылка3.jpg", file: "https://твоя_прямая_ссылка_на_архив3.zip" },
      // Добавляй сюда новые товары
    ];

    function renderProducts() {
      const container = document.getElementById('products');
      container.innerHTML = products.map(p => `
        <div class="card">
          <img src="${p.img}" alt="${p.name}">
          <h3>${p.name}</h3>
          <p class="price">${p.stars} ⭐ Stars</p>
          <button class="buy-btn" onclick="addToCart(${p.id})">В корзину</button>
        </div>
      `).join('');
    }

    function addToCart(id) {
      const product = products.find(p => p.id === id);
      cart.push(product);
      document.getElementById('cart-count').textContent = cart.length;
      tg.showToast(`${product.name} добавлен в корзину`);
    }

    // Покупка всей корзины
    document.getElementById('cart').onclick = async () => {
      if (cart.length === 0) return tg.showAlert("Корзина пуста!");

      const totalStars = cart.reduce((sum, item) => sum + item.stars, 0);

      const response = await fetch('https://твой-backend.onrender.com/create-invoice', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ items: cart.map(i => i.id) })
      });

      const { invoiceLink } = await response.json();
      tg.openInvoice(invoiceLink);
    };

    renderProducts();
  </script>
</body>
</html>
