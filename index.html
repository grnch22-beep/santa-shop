<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Santa Shop</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; background: #0a001f; color: #fff; margin: 0; padding: 0; }
    .header { background: linear-gradient(90deg, #8b00ff, #ff00cc); padding: 25px; text-align: center; font-size: 32px; font-weight: bold; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 20px; padding: 20px; }
    .card { background: #1f1f1f; border-radius: 16px; overflow: hidden; text-align: center; }
    .card img { width: 100%; height: 210px; object-fit: cover; }
    .card h3 { margin: 12px 0 6px; font-size: 16px; }
    .price { color: #00ffcc; font-weight: bold; font-size: 20px; }
    .buy-btn { background: #00c853; color: white; border: none; padding: 14px; width: 100%; font-size: 16px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="header">🎅 Santa Shop</div>
  <div class="grid" id="products"></div>

  <script>
    const products = [
      { id: 1, name: "1000 Подписчиков Twitch", stars: 249, img: "https://i.imgur.com/QFVam4u.png" },
      { id: 2, name: "5000 Лайков TikTok", stars: 199, img: "https://i.imgur.com/4k26xt8.jpeg" }
    ];

    document.getElementById('products').innerHTML = products.map(p => `
      <div class="card">
        <img src="${p.img}" alt="${p.name}">
        <h3>${p.name}</h3>
        <p class="price">${p.stars} ⭐ Stars</p>
        <button class="buy-btn" onclick="alert('Добавлено: ${p.name}')">В корзину</button>
      </div>
    `).join('');
  </script>
</body>
</html>
