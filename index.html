<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Santa Shop</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; background: #0a001f; color: #fff; margin: 0; padding: 0; overflow-y: auto; position: relative; min-height: 100vh; }
    .snow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
    .header { background: linear-gradient(90deg, #8b00ff, #ff00cc); padding: 25px; text-align: center; font-size: 32px; font-weight: bold; z-index: 2; position: relative; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 20px; padding: 20px; z-index: 2; position: relative; }
    .card { background: rgba(31, 31, 47, 0.95); border-radius: 16px; overflow: hidden; text-align: center; transition: 0.3s; border: 1px solid rgba(139,0,255,0.3); }
    .card:hover { transform: scale(1.05); box-shadow: 0 0 25px rgba(139,0,255,0.5); }
    .card img { width: 100%; height: 210px; object-fit: cover; }
    .card h3 { margin: 12px 0 6px; font-size: 16px; }
    .price { color: #00ffcc; font-weight: bold; font-size: 20px; }
    .buy-btn { background: linear-gradient(#00ff88, #00cc66); color: white; border: none; padding: 14px; width: 100%; font-size: 16px; cursor: pointer; font-weight: bold; }

    .cart { position: fixed; bottom: 20px; right: 20px; background: #8b00ff; padding: 16px 24px; border-radius: 50px; font-size: 20px; box-shadow: 0 0 20px rgba(139,0,255,0.8); cursor: pointer; z-index: 1000; }
    
    .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 3000; display: none; align-items: center; justify-content: center; }
    .modal-content { background: #1f1f2f; padding: 25px; border-radius: 16px; width: 90%; max-width: 450px; max-height: 85%; overflow-y: auto; }
    .cart-item { background: #2a2a3a; padding: 12px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
    .remove-btn { color: #ff3366; font-size: 22px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="snow" id="snow"></div>
  <div class="header">🎅 Santa Shop</div>
  <div class="grid" id="products"></div>
  <div class="cart" id="cart">🛒 <span id="cart-count">0</span></div>

  <!-- Модальное окно корзины -->
  <div class="modal" id="cartModal">
    <div class="modal-content">
      <h2>🛒 Корзина</h2>
      <div id="cartItems"></div>
      <p style="margin:20px 0; font-size:18px; text-align:center;">Итого: <span id="totalPrice" style="color:#00ffcc; font-weight:bold;"></span> Stars</p>
      
      <div style="display:flex; gap:10px; margin-top:20px;">
        <button onclick="closeCart()" style="flex:1; padding:14px; background:#555; border:none; border-radius:12px; color:white;">Закрыть</button>
        <button onclick="payCart()" style="flex:2; padding:14px; background:#00c853; border:none; border-radius:12px; color:white; font-weight:bold;">Оплатить</button>
      </div>
    </div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    let cart = [];

    const products = [
      { id: 1, name: "1000 Подписчиков Twitch", stars: 249, img: "https://i.imgur.com/QFVam4u.png" },
      { id: 2, name: "5000 Лайков TikTok", stars: 199, img: "https://i.imgur.com/4k26xt8.jpeg" }
    ];

    function createSnow() {
      const container = document.getElementById('snow');
      for (let i = 0; i < 80; i++) {
        const flake = document.createElement('div');
        flake.textContent = '❄';
        flake.style.position = 'absolute';
        flake.style.color = '#ffffff';
        flake.style.opacity = Math.random() * 0.8 + 0.4;
        flake.style.fontSize = Math.random() * 15 + 12 + 'px';
        flake.style.left = Math.random() * 100 + '%';
        flake.style.top = '-10px';
        flake.style.animation = `fall ${Math.random() * 8 + 6}s linear infinite`;
        flake.style.animationDelay = `-${Math.random() * 10}s`;
        container.appendChild(flake);
      }
    }
    const style = document.createElement('style');
    style.innerHTML = `@keyframes fall { to { transform: translateY(105vh); } }`;
    document.head.appendChild(style);

    function renderProducts() {
      document.getElementById('products').innerHTML = products.map(p => `
        <div class="card">
          <img src="${p.img}" alt="${p.name}">
          <h3>${p.name}</h3>
          <p class="price">${p.stars} ⭐ Stars</p>
          <button class="buy-btn" onclick="addToCart(${p.id})">В корзину</button>
        </div>
      `).join('');
    }

    function addToCart(id) {
      const product = products.find(p => p.id === id);
      const link = prompt(`Куда накручивать ${product.name}?\nВведите ссылку на аккаунт:`);
      if (!link) return;

      cart.push({ ...product, link: link });
      updateCartCount();
      tg.showToast("✅ Добавлено в корзину");
    }

    function updateCartCount() {
      document.getElementById('cart-count').textContent = cart.length;
    }

    function showCart() {
      if (cart.length === 0) return tg.showAlert("Корзина пуста!");

      let html = '';
      let total = 0;

      cart.forEach((item, index) => {
        total += item.stars;
        html += `
          <div class="cart-item">
            <div>
              <strong>${item.name}</strong><br>
              <small>${item.link}</small>
            </div>
            <span class="remove-btn" onclick="removeItem(${index})">✕</span>
          </div>`;
      });

      document.getElementById('cartItems').innerHTML = html;
      document.getElementById('totalPrice').textContent = total;
      document.getElementById('cartModal').style.display = 'flex';
    }

    function removeItem(index) {
      cart.splice(index, 1);
      showCart();
      updateCartCount();
    }

    function closeCart() {
      document.getElementById('cartModal').style.display = 'none';
    }

    function payCart() {
      closeCart();
      if (cart.length === 0) return;

      fetch('https://santa-shop.onrender.com/create-invoice', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ items: cart.map(item => item.id) })
      })
      .then(r => r.json())
      .then(data => {
        if (data.invoiceLink) tg.openInvoice(data.invoiceLink);
        else tg.showAlert("Ошибка создания платежа");
      })
      .catch(() => tg.showAlert("Ошибка соединения"));
    }

    document.getElementById('cart').onclick = showCart;

    // Запуск
    createSnow();
    renderProducts();
  </script>
</body>
</html>
