<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Santa Shop</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body { 
      font-family: system-ui, sans-serif; 
      background: #0a0a12; 
      color: #e0e0ff; 
      margin: 0; 
      padding: 0; 
      overflow-y: auto; 
      position: relative; 
    }

    .snow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; opacity: 0.6; }

    .header { 
      background: linear-gradient(90deg, #4a1d8c, #2a124f); 
      padding: 25px; 
      text-align: center; 
      font-size: 30px; 
      font-weight: bold; 
      z-index: 2; 
      position: relative; 
      border-bottom: 1px solid #5e2a9e;
    }

    .grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); 
      gap: 20px; 
      padding: 20px; 
      z-index: 2; 
      position: relative; 
    }

    .card { 
      background: rgba(25, 25, 40, 0.95); 
      border-radius: 16px; 
      overflow: hidden; 
      text-align: center; 
      transition: 0.3s; 
      border: 1px solid rgba(90, 50, 150, 0.4);
    }

    .card:hover { 
      transform: scale(1.04); 
      box-shadow: 0 0 20px rgba(120, 70, 200, 0.3); 
    }

    .card img { width: 100%; height: 210px; object-fit: cover; }
    .card h3 { margin: 12px 0 6px; font-size: 16px; color: #d0c0ff; }
    .price { color: #88ffcc; font-weight: bold; font-size: 20px; }

    .buy-btn { 
      background: #3a2a6b; 
      color: #c0b0ff; 
      border: none; 
      padding: 14px; 
      width: 100%; 
      font-size: 16px; 
      cursor: pointer; 
      font-weight: bold;
    }

    .buy-btn:hover { background: #4a3a7b; }

    .cart { 
      position: fixed; 
      bottom: 20px; 
      right: 20px; 
      background: #3a2a6b; 
      padding: 16px 24px; 
      border-radius: 50px; 
      font-size: 20px; 
      box-shadow: 0 0 20px rgba(80, 50, 180, 0.5); 
      cursor: pointer; 
      z-index: 1000; 
    }
  </style>
</head>
<body>
  <div class="snow" id="snow"></div>
  <div class="header">🎅 Santa Shop</div>
  <div class="grid" id="products"></div>
  <div class="cart" id="cart">🛒 <span id="cart-count">0</span></div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    let cart = [];

    const products = [
      { id: 1, name: "1000 Подписчиков Twitch", stars: 249, img: "https://i.imgur.com/QFVam4u.png" },
      { id: 2, name: "5000 Лайков TikTok", stars: 199, img: "https://i.imgur.com/4k26xt8.jpeg" }
    ];

    function createSnow() {
      const container = document.getElementById('snow');
      for (let i = 0; i < 60; i++) {
        const flake = document.createElement('div');
        flake.textContent = '❄';
        flake.style.position = 'absolute';
        flake.style.color = '#b0b0ff';
        flake.style.opacity = Math.random() * 0.6 + 0.3;
        flake.style.fontSize = Math.random() * 14 + 11 + 'px';
        flake.style.left = Math.random() * 100 + '%';
        flake.style.top = '-10px';
        flake.style.animation = `fall ${Math.random() * 10 + 8}s linear infinite`;
        flake.style.animationDelay = `-${Math.random() * 12}s`;
        container.appendChild(flake);
      }
    }
    const style = document.createElement('style');
    style.innerHTML = `@keyframes fall { to { transform: translateY(105vh); } }`;
    document.head.appendChild(style);

    function renderProducts() {
      document.getElementById('products').innerHTML = products.map(p => `
        <div class="card">
          <img src="${p.img}" alt="${p.name}">
          <h3>${p.name}</h3>
          <p class="price">${p.stars} ⭐ Stars</p>
          <button class="buy-btn" onclick="addToCart(${p.id})">В корзину</button>
        </div>
      `).join('');
    }

    function addToCart(id) {
      const product = products.find(p => p.id === id);
      const link = prompt(`Куда накручивать ${product.name}?\nВведите ссылку:`);
      if (!link) return;

      cart.push({ ...product, link: link });
      document.getElementById('cart-count').textContent = cart.length;
      tg.showToast("✅ Добавлено");
    }

    document.getElementById('cart').onclick = () => {
      if (cart.length === 0) return tg.showAlert("Корзина пуста!");

      let text = "Ваш заказ:\n\n";
      let total = 0;
      cart.forEach(item => {
        text += `• ${item.name}\n   Ссылка: ${item.link}\n\n`;
        total += item.stars;
      });
      text += `Итого: ${total} Stars`;
      tg.showAlert(text);
    };

    createSnow();
    renderProducts();
  </script>
</body>
</html>
