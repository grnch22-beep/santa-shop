<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avatar Shop</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; background: #0f0f0f; color: #fff; margin: 0; padding: 0; }
    .header { background: linear-gradient(90deg, #229ed9, #1a7ab8); padding: 20px; text-align: center; font-size: 28px; font-weight: bold; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 20px; padding: 20px; }
    .card { background: #1f1f1f; border-radius: 16px; overflow: hidden; text-align: center; transition: 0.3s; }
    .card:hover { transform: scale(1.08); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
    .card img { width: 100%; height: 170px; object-fit: cover; }
    .card h3 { margin: 12px 0 6px; font-size: 16px; }
    .price { color: #00ff9d; font-weight: bold; font-size: 18px; }
    .buy-btn { background: #00c853; color: white; border: none; padding: 14px; width: 100%; font-size: 16px; cursor: pointer; }
    .cart { position: fixed; bottom: 20px; right: 20px; background: #229ed9; padding: 16px 22px; border-radius: 50px; font-size: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.6); cursor: pointer; z-index: 1000; }
  </style>
</head>
<body>
  <div class="header">🖼️ Avatar Shop</div>
  <div class="grid" id="products"></div>
  <div class="cart" id="cart">🛒 <span id="cart-count">0</span></div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    let cart = [];

    const products = [
      { id: 1, name: "Космос & Неон", stars: 49, img: "https://picsum.photos/id/1015/300/300" },
      { id: 2, name: "Аниме стиль", stars: 79, img: "https://picsum.photos/id/201/300/300" },
      { id: 3, name: "Минимализм 2026", stars: 119, img: "https://picsum.photos/id/237/300/300" },
    ];

    function renderProducts() {
      document.getElementById('products').innerHTML = products.map(p => `
        <div class="card">
          <img src="${p.img}" alt="${p.name}">
          <h3>${p.name}</h3>
          <p class="price">${p.stars} ⭐ Stars</p>
          <button class="buy-btn" onclick="addToCart(${p.id})">В корзину</button>
        </div>
      `).join('');
    }

    function addToCart(id) {
      cart.push(id);
      document.getElementById('cart-count').textContent = cart.length;
      tg.showToast("✅ Добавлено в корзину");
    }

    document.getElementById('cart').onclick = async () => {
      if (cart.length === 0) return tg.showAlert("Корзина пуста!");

      const response = await fetch('https://santa-shop.onrender.com/create-invoice', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ items: cart })
      });

      const data = await response.json();
      if (data.invoiceLink) {
        tg.openInvoice(data.invoiceLink);
      } else {
        tg.showAlert("Ошибка оплаты");
      }
    };

    renderProducts();
  </script>
</body>
</html>
